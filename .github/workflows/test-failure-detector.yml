name: Test Failure Detector

on:
  workflow_run:
    workflows: ["Daily"]
    branches:
      - unstable
    types:
      - completed

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  detect-test-failures:
    runs-on: ubuntu-latest
    if: >
      (github.event.workflow_run.event == 'workflow_dispatch' ||
       (github.event.workflow_run.event == 'schedule' && github.repository == 'valkey-io/valkey')) &&
      github.event.workflow_run.conclusion != 'cancelled'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Step 1: Download consolidated artifact
      - name: Download failures
        id: download
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const runId = context.payload.workflow_run.id;
            console.log(`Fetching artifacts from run ${runId}`);

            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
              },
              (response) => response.data
            );

            const matched = artifacts.find(a => a.name === 'all-test-failures');
            if (!matched) {
              console.log('No all-test-failures artifact found');
              core.setOutput('found', 'false');
              return;
            }

            console.log(`Downloading: ${matched.name}`);
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: matched.id,
              archive_format: 'zip',
            });
            fs.writeFileSync('all-test-failures.zip', Buffer.from(download.data));
            core.setOutput('found', 'true');

      - name: Unzip artifact
        if: steps.download.outputs.found == 'true'
        run: |
          unzip -o all-test-failures.zip
          echo "=== Content ==="
          cat all-test-failures.json

      # Step 2: Get per-job URLs
      - name: Get job URLs
        if: steps.download.outputs.found == 'true'
        id: jobs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const runId = context.payload.workflow_run.id;

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
              },
              (response) => response.data
            );

            console.log(`Found ${jobs.length} jobs`);

            const jobUrlMap = {};
            for (const job of jobs) {
              jobUrlMap[job.name] = job.html_url;

              const normalized = job.name
                .replace(/\s*\(([^)]+)\)/g, '-$1')
                .replace(/\s+/g, '-');
              if (normalized !== job.name) {
                jobUrlMap[normalized] = job.html_url;
                console.log(`${job.name} -> ${job.html_url} (also: ${normalized})`);
              } else {
                console.log(`${job.name} -> ${job.html_url}`);
              }
            }

            fs.writeFileSync('job-urls.json', JSON.stringify(jobUrlMap, null, 2));

      # Step 3: Group failures by test file
      - name: Group failures by file
        if: steps.download.outputs.found == 'true'
        id: merge
        run: |
          python3 << 'EOF'
          import json, os, sys

          with open("job-urls.json") as f:
              job_urls = json.load(f)

          with open("all-test-failures.json") as f:
              all_failures = json.load(f)

          # Group by test file
          by_file = {}

          for job_name, suites in all_failures.items():
              for suite_name, entries in suites.items():
                  for entry in entries:
                      test_file = entry["test_file"]
                      test_name = entry["test_name"]

                      if test_file not in by_file:
                          by_file[test_file] = {}

                      if test_name not in by_file[test_file]:
                          by_file[test_file][test_name] = {
                              "test_name": test_name,
                              "test_file": test_file,
                              "error": entry.get("error", ""),
                              "jobs": []
                          }

                      by_file[test_file][test_name]["jobs"].append({
                          "job": job_name,
                          "suite": suite_name,
                          "url": job_urls.get(job_name, "")
                      })
                      print(f"{test_name} in {test_file} ({job_name}/{suite_name})")

          # Convert to list format
          result = []
          for test_file, tests in by_file.items():
              result.append({
                  "test_file": test_file,
                  "tests": list(tests.values())
              })

          print(f"\nTotal files with failures: {len(result)}")
          print(f"Total unique test failures: {sum(len(f['tests']) for f in result)}")

          with open("failures.json", "w") as f:
              json.dump(result, f, indent=2)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"has_failures={'true' if result else 'false'}\n")
          EOF

      # Step 4: Create or update issues (one per test file, one comment per test case)
      - name: Create or update issues
        if: steps.merge.outputs.has_failures == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const script = require('./.github/scripts/create-or-update-issues.js');
            await script({github, context});
