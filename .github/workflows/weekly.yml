name: Weekly Test Workflow for Released Branches
on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch: {}
permissions:
  actions: write
  contents: read
  pull-requests: read
concurrency:
  group: weekly-release-tests
  cancel-in-progress: false
jobs:
  run-daily-for-release-branches:
    permissions:
      actions: write
      contents: read
      pull-requests: read
    uses: ./.github/workflows/daily.yml
    with:
      use_repo: yaronsananes/valkey
      use_git_ref: backport-failures-output-flag
      skipjobs: ""
      skiptests: ""
    secrets: inherit