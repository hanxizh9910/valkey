name: Flaky Test Detector

on:
  workflow_run:
    workflows: ["Daily"]
    types:
      - completed

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  detect-flaky-tests:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download all test-failures artifacts
      - name: Download artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runId = context.payload.workflow_run.id;
            console.log(`Fetching artifacts from run ${runId}`);

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            const matched = artifacts.data.artifacts.filter(a => a.name.startsWith('test-failures-'));
            console.log(`Found ${matched.length} test-failures artifacts`);

            fs.mkdirSync('artifacts', { recursive: true });

            for (const artifact of matched) {
              console.log(`Downloading: ${artifact.name}`);
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
                archive_format: 'zip',
              });
              fs.writeFileSync(`artifacts/${artifact.name}.zip`, Buffer.from(download.data));
            }

      - name: Unzip artifacts
        run: |
          for zip in artifacts/*.zip; do
            dir="extracted/$(basename "$zip" .zip)"
            mkdir -p "$dir"
            unzip -o "$zip" -d "$dir"
          done
          echo "=== All files ==="
          find extracted -type f

      # Step 2: Get per-job URLs from the workflow run
      - name: Get job URLs
        id: jobs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runId = context.payload.workflow_run.id;

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            const jobUrlMap = {};
            for (const job of jobs.data.jobs) {
              jobUrlMap[job.name] = job.html_url;
              console.log(`${job.name} -> ${job.html_url}`);
            }

            fs.writeFileSync('job-urls.json', JSON.stringify(jobUrlMap, null, 2));

      # Step 3: Merge failures and group by test name
      - name: Merge failures
        id: merge
        run: |
          python3 << 'EOF'
          import json, glob, os

          with open("job-urls.json") as f:
              job_urls = json.load(f)

          grouped = {}

          for f in glob.glob("extracted/**/test-failures.json", recursive=True):
              print(f"Reading: {f}")
              with open(f) as fh:
                  failures = json.load(fh)
              for failure in failures:
                  name = failure["name"]
                  job = failure.get("job", "unknown")
                  if name not in grouped:
                      grouped[name] = {
                          "name": name,
                          "error": failure.get("error", ""),
                          "jobs": []
                      }
                  grouped[name]["jobs"].append({
                      "job": job,
                      "url": job_urls.get(job, "")
                  })
                  print(f"  ❌ {name} in {job}")

          unique_failures = list(grouped.values())
          print(f"\nTotal unique failures: {len(unique_failures)}")

          with open("failures.json", "w") as f:
              json.dump(unique_failures, f, indent=2)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"has_failures={'true' if unique_failures else 'false'}\n")
          EOF

      # Step 4: Create or update issues
      - name: Create or update issues
        if: steps.merge.outputs.has_failures == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const failures = JSON.parse(fs.readFileSync('failures.json', 'utf8'));
            const label = 'test-failure';

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'e11d48',
                  description: 'Test failure detected by CI',
                });
              }
            }

            // Fetch all open test-failure issues
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 100,
            });

            const today = new Date().toISOString().split('T')[0];

            for (const failure of failures) {
              const title = `[TEST-FAILURE] ${failure.name}`;
              const envList = failure.jobs.map(j => j.job);
              const ciLinks = failure.jobs.map(j => `- \`${j.job}\`: [CI link](${j.url})`).join('\n');
              const envLine = `**Environments:** ${envList.map(e => '`' + e + '`').join(', ')}`;

              const existing = existingIssues.data.find(i => i.title === title);

              if (existing) {
                // --- OLD ISSUE ---
                console.log(`Found existing issue #${existing.number} for ${failure.name}`);

                // Parse existing environments from description
                const envMatch = existing.body.match(/\*\*Environments:\*\*\s*(.+)/);
                const existingEnvs = envMatch
                  ? envMatch[1].match(/`([^`]+)`/g).map(e => e.replace(/`/g, ''))
                  : [];

                const newEnvs = envList.filter(e => !existingEnvs.includes(e));

                if (newEnvs.length > 0) {
                  // New environment found — update description
                  console.log(`  New environments found: ${newEnvs.join(', ')}`);
                  const allEnvs = [...existingEnvs, ...newEnvs];
                  const newEnvLine = `**Environments:** ${allEnvs.map(e => '`' + e + '`').join(', ')}`;
                  const updatedBody = existing.body.replace(/\*\*Environments:\*\*\s*.+/, newEnvLine);

                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    body: updatedBody,
                  });
                } else {
                  console.log(`  No new environments`);
                }

                // Always add a single comment with all CI links from this run
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: `Test failed again on ${today}.\n\n**Failed in:**\n${ciLinks}`,
                });

              } else {
                // --- NEW ISSUE ---
                console.log(`Creating issue for ${failure.name}`);
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  labels: [label],
                  body: [
                    `**Summary**`,
                    ``,
                    `\`${failure.name}\` test is failing in CI.`,
                    ``,
                    `**Failing test(s)**`,
                    ``,
                    `- Test name: \`${failure.name}\``,
                    `- CI link(s):`,
                    ciLinks,
                    ``,
                    `**Error stack trace**`,
                    ``,
                    '```',
                    failure.error || 'N/A',
                    '```',
                    ``,
                    envLine,
                    ``,
                    `---`,
                    `*Auto-created by Flaky Test Detector*`,
                  ].join('\n'),
                });
              }
            }

            console.log(`Done. Processed ${failures.length} failure(s).`);
